# =============================================================================
# SHOULD NOT FIRE — work IS engaging the risk; silence is the correct output
# (the trust-critical class; the predicate gate cannot tell these from drift)
# =============================================================================

- id: j-aim-101
  category: should-not-fire-on-aim
  scenario: "Risk is teams-switch-from-spreadsheets; work built the import wizard, ran 4 migration sessions, instrumented week-2 return, interviewed teams about switching."
  project_state:
    ideas:
      - file: IDEA-001-plan.md
        capture_log_entries: 0
        canvas:
          riskiest_assumption_text: "teams will switch from spreadsheets to this for weekly planning"
    docs_files:
      - { path: docs/devlog.md, content_ref: aim_spreadsheet }
      - { path: docs/extractions/EXTR-001.md, fixture: extraction_record_up }
  expected_judgment:
    fires: false
    must_not:
      - firing a drift nudge when the work directly tests switching behavior
  why: "Every recent entry is about switching: import wizard, migration sessions, return instrumentation, switching interviews. The experiment line is blank but the validation is happening. Silence is correct."

