# =============================================================================
# AMBIGUOUS — a reasonable model could fire OR stay silent; don't punish either
# =============================================================================

- id: j-amb-201
  category: ambiguous
  scenario: "Risk is the-integration-is-the-wedge; work built a thin real Linear integration and demoed it to one partner who loved it — building toward the wedge, or building-not-testing?"
  project_state:
    ideas:
      - file: IDEA-001-wedge.md
        capture_log_entries: 0
        canvas:
          riskiest_assumption_text: "the integration is the wedge, not the dashboard"
    docs_files:
      - { path: docs/devlog.md, content_ref: ambiguous_integration }
      - { path: docs/extractions/EXTR-001.md, fixture: extraction_record_up }
  expected_judgment:
    acceptable: [fires, silent]
    must_not:
      - asserting with false confidence that the founder is clearly drifting or clearly on-aim
  why: "One partner reaction is a signal but not a test; a thin integration slice is plausibly building-toward-the-wedge. Either a gentle drift nudge OR silence is defensible. Label both acceptable so the grader does not punish a reasonable call."
