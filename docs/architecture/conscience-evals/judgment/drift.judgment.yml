# JUDGMENT eval set — moment: drift (the model's call, not the predicate gate)
# Surface: docs/architecture/conscience-evals/judgment/
# Replay (zero-dep, every commit): replay.js   ·   Re-grade (paid, out-of-band): regrade.js
#
# This is the COMPLEMENT to moment-drift.yml. That file tests the GATE (does the
# hook fire on the right structural state). THIS file tests the JUDGMENT the
# model makes once the gate is open: given a named risk + accumulated work with
# no validation plan, is the recent work TESTING the risk (→ stay silent) or
# building AROUND it (→ fire + name the specific gap)?
#
# Every case below is a genuine OPEN-GATE state (risk filled, ≥3 devlog entries,
# no "Experiment this week" line) — that's not under test here; replay.js asserts
# well-formedness statically and moment-drift.yml proves the gate opens on this
# exact shape. What's under test is the model's drift-vs-on-aim call.
#
# `expected_judgment` is the HUMAN-AUTHORED label (ground truth). `must_reference`
# / `must_not` is the rubric a future LLM-judge (regrade.js) grades against.
#
# COVERAGE NOTE (no silent caps): the should-NOT-fire / on-aim class is the
# trust-critical one — a judge that cries drift when the founder is on-target
# erodes trust exactly like a false caution. This starter set has 5; it SHOULD
# grow toward ≥10. replay.js enforces the current floor and prints the target.

# =============================================================================
# SHOULD FIRE + NAME THE GAP — work is building AROUND the named risk
# =============================================================================

- id: j-drift-001
  category: should-fire-and-name-gap
  scenario: "Risk is teams-switch-from-spreadsheets; last 4 sessions built export, dark mode, OAuth, roles — none touches switching behavior."
  project_state:
    ideas:
      - file: IDEA-001-plan.md
        capture_log_entries: 0
        canvas:
          riskiest_assumption_text: "teams will switch from spreadsheets to this for weekly planning"
    docs_files:
      - { path: docs/devlog.md, content_ref: drift_spreadsheet }
      - { path: docs/extractions/EXTR-001.md, fixture: extraction_record_up }
  expected_judgment:
    fires: true
    names_specific_gap: true
    must_reference:
      - the named risk about teams switching from spreadsheets
      - at least one specific recent build item that is not about switching
    must_not:
      - generic you-should-validate with no stated-vs-actual comparison
      - praise framing such as you-have-been-productive
  why: "Four sessions of orthogonal feature work; nothing tests whether teams actually switch. Textbook build-around-the-risk."

