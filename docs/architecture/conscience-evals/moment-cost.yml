# Conscience eval set — moment: cost (cost-budget-loop)
# Loop spec: stages/L1-mvp/template/docs/loops/cost-budget-loop.md
# Detector: docs/architecture/conscience-evals/runner.js (v0.27.0+)
#
# Each case materializes a synthetic project (src/ + docs/) and invokes the
# hook. Cases isolate the cost moment by also closing ai-failure-state-loop's
# exit (both loops share an entry — the first LLM SDK call site). When BOTH
# moments are expected, use `moments: [cost, failure-mode]` (multi-moment
# assertion, v0.27.0+).

# =============================================================================
# SHOULD FIRE — the bill exists, no budget declared
# =============================================================================

- id: m-cost-001
  category: should-fire
  scenario: "Anthropic SDK call, no budget doc, failure-mode closed (isolated cost test)."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
    docs_files:
      - { path: docs/ai-failure-states.md, fixture: failure_states_doc }
  expected_detection:
    fires: true
    moment: cost
    confidence: high
  why: "Anthropic SDK call site exists; cost budget missing. Cost fires; failure-mode closed because both its exits are satisfied."

- id: m-cost-002
  category: should-fire
  scenario: "OpenAI SDK call, no budget doc, failure-mode closed."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: openai_call }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
    docs_files:
