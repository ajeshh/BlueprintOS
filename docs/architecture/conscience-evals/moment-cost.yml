  expected_detection:
    fires: true
    moment: cost
  why: "Wrapper code without a declared budget is observability without a target. Loop stays open."

# =============================================================================
# SHOULD-FIRE-MULTI — both cost AND failure-mode (the natural state at first call)
# =============================================================================

- id: m-cost-007
  category: should-fire-multi
  scenario: "Anthropic SDK call, neither budget NOR failure-states declared — the day-one inflection."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
  expected_detection:
    fires: true
    moments: [cost, failure-mode]
  why: "The natural state when a founder first reaches for an LLM. Both loops open simultaneously; cohort-aware framing should mention BOTH gaps in one nudge."

- id: m-cost-008
  category: should-fire-multi
  scenario: "OpenAI SDK call, no discipline declared at all."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: openai_call }
  expected_detection:
    fires: true
    moments: [cost, failure-mode]
  why: "Same as m-cost-007, with a different provider — both moments fire."

# =============================================================================
# SHOULD NOT FIRE — closure or no-entry
# =============================================================================

- id: m-cost-101
  category: should-not-fire
  scenario: "Full discipline declared — budget doc + logger ref + failure-states + handlers."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/logger.ts, fixture: cost_logger_ref }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
    docs_files:
      - { path: docs/ai-cost-budget.md, fixture: cost_budget_doc }
      - { path: docs/ai-failure-states.md, fixture: failure_states_doc }
  expected_detection:
    fires: false
  why: "Both loops closed — zero signals expected."

- id: m-cost-102
  category: should-not-fire
  scenario: "No LLM SDK calls anywhere — entry predicate not met."
  project_state:
    src_files:
      - { path: src/util.ts, fixture: no_llm_code }
  expected_detection:
    fires: false
  why: "The cost-budget-loop must not over-fire on non-AI projects. Entry predicate is the JIT gate."

- id: m-cost-103
  category: should-not-fire
  scenario: "Empty project — no src/ files at all."
  project_state: {}
  expected_detection:
    fires: false
  why: "Fresh project, no code, no drift. The loop's entry pattern requires actual call sites."

- id: m-cost-104
  category: should-not-fire
  scenario: "Pre-MVP project — no LLM calls; only ideas + canvases (closed)."
  project_state:
    ideas:
      - file: IDEA-001-foo.md
        capture_log_entries: 4
        canvas:
          riskiest_assumption_text: "users will sign up after seeing the landing page; metric = 100 signups in week 1; experiment = paid ad to landing page; deadline = 2026-06-01"
  expected_detection:
    fires: false
  why: "A canvas-closed Quickstart project with no code shouldn't see a cost moment. Confirms the entry isolation."
