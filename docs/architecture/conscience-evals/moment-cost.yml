- id: m-cost-005
  category: should-fire
  scenario: "Budget doc exists but no cost-logger reference in src/."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
    docs_files:
      - { path: docs/ai-cost-budget.md, fixture: cost_budget_doc }
      - { path: docs/ai-failure-states.md, fixture: failure_states_doc }
  expected_detection:
    fires: true
    moment: cost
  why: "Exit predicate is *both* doc exists AND logger ref present. Doc alone isn't enough — declaration without instrumentation is theater."

- id: m-cost-006
  category: should-fire
  scenario: "Cost-logger reference exists but no budget doc."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/logger.ts, fixture: cost_logger_ref }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
