# Conscience eval set — moment: failure-mode (ai-failure-state-loop)
# Loop spec: stages/L1-mvp/template/docs/loops/ai-failure-state-loop.md
# Detector: docs/architecture/conscience-evals/runner.js (v0.27.0+)
#
# Each case isolates failure-mode by also closing cost-budget-loop (the two
# loops share an entry — the first LLM SDK call site). The `category` field
# is organizational; the runner only reads `expected_detection`.

# =============================================================================
# SHOULD FIRE — LLM call exists, no failure-states design
# =============================================================================

- id: m-fm-001
  category: should-fire
  scenario: "Anthropic SDK call, no failure-states doc, cost-budget closed (isolated failure-mode test)."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/logger.ts, fixture: cost_logger_ref }
    docs_files:
      - { path: docs/ai-cost-budget.md, fixture: cost_budget_doc }
  expected_detection:
    fires: true
    moment: failure-mode
    confidence: high
  why: "LLM call site exists; failure-states design missing. Failure-mode fires; cost closed."

