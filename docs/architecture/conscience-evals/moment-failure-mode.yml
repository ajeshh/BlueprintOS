# =============================================================================
# SHOULD NOT FIRE — closure or no-entry
# =============================================================================

- id: m-fm-101
  category: should-not-fire
  scenario: "Full AI-first discipline declared — every artifact present (incl. cost-review per v0.30+)."
  project_state:
    src_files:
      - { path: src/api.ts, fixture: anthropic_call }
      - { path: src/logger.ts, fixture: cost_logger_ref }
      - { path: src/handlers.ts, fixture: failure_handlers_ref }
    docs_files:
      - { path: docs/ai-cost-budget.md, fixture: cost_budget_doc }
      - { path: docs/ai-failure-states.md, fixture: failure_states_doc }
      - { path: docs/cost-reviews/REVIEW-2026-05-27.md, fixture: cost_review_record }
  expected_detection:
    fires: false
  why: "All three AI-first loops closed (cost-budget + failure-mode + cost-review). The v0.30 cost-review-loop on this surface also needs satisfying for zero signals."

- id: m-fm-102
