  expected_detection:
    fires: false
  why: "Explicit project-level override. Conscience never fires; the founder has opted out cleanly. (Requires project-config recognition — implementation TBD.)"

# --- edge / threshold (2) ---

- id: m1-snf-020
  category: should-not-fire
  failure_mode: over-fires-on-fresh-project
  scenario: "Exactly 2 captures across 2 ideas — just under threshold."
  project_state:
    ideas:
      - { file: IDEA-001-a.md, capture_log_entries: 1, canvas: false }
      - { file: IDEA-002-b.md, capture_log_entries: 1, canvas: false }
  expected_detection:
    fires: false
  why: "Threshold is 3. Boundary must be honored."

- id: m1-snf-021
  category: should-not-fire
  failure_mode: false-positive-not-drift
  scenario: "Three captures in ONE idea, deepening — not breadth-spreading."
  project_state:
    ideas:
      - file: IDEA-001-foo.md
        capture_log_entries: 3
        canvas: false
  expected_detection:
    fires: true
    moment: caution
    suppress_if: ["single_idea_deepening"]
    confidence: low
  why: "Current hook treats this same as breadth-drift (it counts total captures). Arguably going deep on ONE idea is the opposite of drift. Surface with low confidence + suppress hint; let model judge. Fix-target for refined detector."

