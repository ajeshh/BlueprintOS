  category: should-not-fire
  failure_mode: acknowledged-already
  scenario: "Project-level CLAUDE.md amendment opts out of moment-1."
  project_state:
    ideas:
      - { file: IDEA-001-a.md, capture_log_entries: 4, canvas: false }
      - { file: IDEA-002-b.md, capture_log_entries: 4, canvas: false }
    claude_md_amendments:
