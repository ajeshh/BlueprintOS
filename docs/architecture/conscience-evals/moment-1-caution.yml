# Conscience eval set — moment #1: caution ("what does this prove?")
# Detector: docs/architecture/conscience-evals/runner.js → invokes the hook
# Spec: ../README.md
# First cut by Claude on 2026-05-22. NEEDS AJESH SHARPENING PASS.
#
# Each entry's project_state describes a synthetic docs/ideas/ tree the runner
# materializes in a temp dir; the runner invokes the hook against it and
# asserts the parsed JSON output matches expected_detection.

# =============================================================================
# SHOULD FIRE (~22)
# Classic validation drift — multiple captures, nothing has crossed the
# canvas's riskiest-assumption threshold.
# =============================================================================

- id: m1-sf-001
  category: should-fire
  scenario: "Three ideas captured, no canvas anywhere — bare threshold drift."
  project_state:
    ideas:
      - file: IDEA-001-foo.md
        capture_log_entries: 1
        canvas: false
      - file: IDEA-002-bar.md
        capture_log_entries: 1
        canvas: false
      - file: IDEA-003-baz.md
        capture_log_entries: 1
        canvas: false
  expected_detection:
    fires: true
    moment: caution
    confidence: medium
  why: "Total captures = 3 (threshold), zero canvases. Honest drift signal."

- id: m1-sf-002
