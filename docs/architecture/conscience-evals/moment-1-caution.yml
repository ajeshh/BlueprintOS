# --- fires-mid-other-work (3) — these test suppress_if behavior, not the trigger ---

- id: m1-snf-005
  category: should-not-fire
  failure_mode: fires-mid-other-work
  scenario: "Drift criteria met, but user prompt is a debugging question."
  project_state:
    ideas:
      - { file: IDEA-001-a.md, capture_log_entries: 3, canvas: false }
      - { file: IDEA-002-b.md, capture_log_entries: 3, canvas: false }
    user_prompt: "why is this function returning undefined when I pass null?"
  expected_detection:
    fires: true
    moment: caution
    suppress_if: ["user_in_unrelated_work"]
  why: "The drift exists; the hook should still return the signal — but with `suppress_if: user_in_unrelated_work` so the model knows to defer. This is the structured-output benefit: detection and decision are separated."

- id: m1-snf-006
