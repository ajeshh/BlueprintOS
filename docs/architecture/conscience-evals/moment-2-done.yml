      what_would_change_plan: "If 0-2 of 10 register interest, the willingness-to-pay isn't there — bootstrap-only path."
  expected_detection:
    fires: true
    moment: done
    confidence: high
  why: "One placeholder is fine; the gating criteria (riskiest + plan) are met. The /canvas skill says 'most cells' not 'all.'"

