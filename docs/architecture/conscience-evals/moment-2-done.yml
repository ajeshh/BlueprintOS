# Conscience eval set — moment #2: "Done!" (the /canvas graduation moment)
# Detector: lives in the /canvas skill prompt today (not a hook). The runner
# tests *expected skill behavior* given a canvas state — i.e., would the
# skill correctly identify "Done!" or would it keep filling cells.
# Spec: ../README.md
# First cut by Claude on 2026-05-22. NEEDS AJESH SHARPENING PASS.
#
# Criteria for Done! (per /canvas SKILL.md, v0.11.0):
#   1. Most cells filled with real answers (≥7 of 9 non-placeholder)
#   2. Riskiest assumption has a VALIDATION PLAN:
#        a) an experiment this week, AND
#        b) what result would change the plan
#
# When both are met → Done! fires (Arrival + Next doorway).
# When either is missing → continue the canvas-filling conversation.

# =============================================================================
# SHOULD FIRE (~20)
# Canvas holds up + the riskiest assumption has a real validation plan.
# =============================================================================

- id: m2-sf-001
  category: should-fire
  scenario: "All 9 cells filled with real text, riskiest-assumption has experiment + change-the-plan."
  project_state:
    canvas:
      cells_filled_real: 9
      cells_placeholder: 0
      riskiest_assumption: "Whether founders will actually finish a /canvas in one sitting or bounce off."
      experiment_this_week: "Show /canvas to 5 founders for 20 min each; count how many complete >= 5 cells."
      what_would_change_plan: "If <2 of 5 complete it, the cell-prompts are wrong (or the cohort is wrong) — revisit cells or audience."
  expected_detection:
    fires: true
    moment: done
    confidence: high
  why: "Textbook Done! — canvas holds up, riskiest assumption has a real bet + a real test + a real disconfirmation rule."

