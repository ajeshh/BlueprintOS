    signal_text_violation: removes-agency
  why: "Fires *correctly* on triggering criteria. Detector output VIOLATES the voice rule (skill says offer, never push). This is a signal-text eval, not a trigger eval — but we flag here too because the trigger and the bad signal arrive together. Separate signal-language pass will cover this in depth."

