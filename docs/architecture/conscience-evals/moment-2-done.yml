# --- fires-too-early (6) ---

- id: m2-snf-001
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "Canvas exists but only 3 cells are real; rest are placeholders."
  project_state:
    canvas:
      cells_filled_real: 3
      cells_placeholder: 6
      riskiest_assumption: "_(the one most likely to be fatal and least proven)_"
  expected_detection:
    fires: false
  why: "Below the 'most cells filled' threshold AND riskiest is still placeholder. Skill should keep filling cells."

- id: m2-snf-002
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "All cells filled but most are `_(not yet)_` placeholders."
  project_state:
    canvas:
      cells_filled_real: 1
      cells_placeholder: 8
      riskiest_assumption: "_(not yet)_"
  expected_detection:
    fires: false
  why: "Placeholders are honest blanks; they don't count as filled. Don't graduate on emptiness."

- id: m2-snf-003
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "Cells real but riskiest assumption is missing entirely."
  project_state:
    canvas:
      cells_filled_real: 9
      cells_placeholder: 0
      riskiest_assumption: null
      experiment_this_week: null
      what_would_change_plan: null
  expected_detection:
    fires: false
  why: "All cells filled but heartbeat is empty. The skill's gating is BOTH conditions — riskiest + plan are non-negotiable."

- id: m2-snf-004
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "Riskiest assumption filled but no experiment named."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether founders will tolerate the conscience interrupting them."
      experiment_this_week: "_(not yet)_"
      what_would_change_plan: "_(not yet)_"
  expected_detection:
    fires: false
  why: "Riskiest is named, plan is not. Skill should ask what experiment would test it."

- id: m2-snf-005
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "Experiment named but no disconfirmation rule."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether the loop primitive holds across moments."
      experiment_this_week: "Try authoring 3 different loops."
      what_would_change_plan: "_(not yet)_"
  expected_detection:
    fires: false
  why: "No 'what result would change the plan' = no real test — just an activity. Ries: validated *learning*, not validated *busy-work*."

- id: m2-snf-006
  category: should-not-fire
  failure_mode: fires-too-early
  scenario: "Experiment is vague — 'talk to users.'"
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether founders use BOSS."
      experiment_this_week: "Talk to some founders."
      what_would_change_plan: "See what they say."
  expected_detection:
    fires: false
  why: "Vague experiment + vague disconfirmation = no real test. Skill should sharpen, not graduate. (Hard to detect mechanically — flag-target.)"

# --- riskiest-assumption-stale (3) ---

- id: m2-snf-007
  category: should-not-fire
  failure_mode: riskiest-assumption-stale
  scenario: "Plan filled weeks ago but never run — no devlog evidence it happened."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether founders complete the canvas."
      experiment_this_week: "Show /canvas to 5 founders."
      what_would_change_plan: "If <3 complete it, the cell-prompts are wrong."
      riskiest_filled_days_ago: 21
      devlog_mentions_experiment: false
  expected_detection:
    fires: false
  why: "Plan exists but was never actioned. Done! shouldn't fire just because a plan is *written* — it should fire when the *learning* is in. (Implementation-tricky: requires devlog inspection. Flag-target.)"

- id: m2-snf-008
  category: should-not-fire
  failure_mode: riskiest-assumption-stale
  scenario: "Plan was run; result came back disconfirming; canvas not yet updated."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether founders complete the canvas."
      experiment_this_week: "Show /canvas to 5 founders."
      what_would_change_plan: "If <3 complete it, the cell-prompts are wrong."
      riskiest_filled_days_ago: 14
    devlog:
      - "Ran the canvas test; 1 of 5 completed it. Cell prompts need work."
  expected_detection:
    fires: false
  why: "The plan disconfirmed the assumption. Done! shouldn't fire — the canvas isn't done; it needs revision. Skill should surface the disconfirmation instead."

- id: m2-snf-009
  category: should-not-fire
  failure_mode: riskiest-assumption-stale
  scenario: "Plan was run but result is ambiguous — neither confirm nor disconfirm."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      riskiest_assumption: "Whether founders use the conscience."
      experiment_this_week: "Trial run on 3 founders for two weeks."
      what_would_change_plan: "If felt-response trends negative, redesign."
    devlog:
      - "Ran trial on 2 of 3 (third dropped out). Results mixed — one positive, one neutral."
  expected_detection:
    fires: false
  why: "Ambiguous result = the experiment didn't actually test the assumption. Re-design the test before graduating."

# --- triggered-by-trivial-change (3) ---

- id: m2-snf-010
  category: should-not-fire
  failure_mode: triggered-by-trivial-change
  scenario: "Canvas already at threshold; user just fixed a typo."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      previous_versions_crossed_threshold: true
      latest_change_was_typo: true
  expected_detection:
    fires: false
  why: "Done! is a *first-crossing* event. Trivial edits to an already-crossed canvas don't re-trigger."

- id: m2-snf-011
  category: should-not-fire
  failure_mode: triggered-by-trivial-change
  scenario: "Canvas previously crossed; user added one bullet point to risks-and-harms."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      previous_versions_crossed_threshold: true
      latest_change_was_addition: true
      latest_change_size_chars: 80
  expected_detection:
    fires: false
  why: "Already-graduated canvases evolve; that's the point of the snapshot-not-blueprint design. Don't re-fire on minor improvements."

- id: m2-snf-012
  category: should-not-fire
  failure_mode: triggered-by-trivial-change
  scenario: "Canvas at version 0.4, user updated `version` field but no substance change."
  project_state:
    canvas:
      cells_filled_real: 8
      cells_placeholder: 1
      previous_versions_crossed_threshold: true
      latest_change_was_metadata_only: true
  expected_detection:
    fires: false
  why: "Bumping the version field isn't crossing a threshold. Substance is what matters."

# --- removes-agency (3) ---

- id: m2-snf-013
  category: should-not-fire
  failure_mode: removes-agency
  scenario: "Done! signal would push `boss unlock mvp` as the obvious next step (rather than offering)."
  project_state:
    canvas:
      cells_filled_real: 9
      cells_placeholder: 0
      riskiest_assumption: "..."
      experiment_this_week: "..."
      what_would_change_plan: "..."
    detector_output_under_test:
      next_doorway: "You should run `boss unlock mvp` now."
  expected_detection:
    fires: true
